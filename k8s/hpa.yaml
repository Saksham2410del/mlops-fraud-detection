# Horizontal Pod Autoscaler — Fraud Detection API
# Automatically scales the number of pods based on CPU and memory usage.
#
# Scaling behavior:
#   - Scales UP when avg CPU > 70% or avg memory > 80%
#   - Min 2 pods (high availability) → Max 10 pods
#   - Scale-up cooldown: 60s  (react quickly to traffic spikes)
#   - Scale-down cooldown: 300s (avoid flapping on temporary dips)
#
# Prerequisite:
#   Minikube must have the metrics-server enabled:
#     minikube addons enable metrics-server

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraud-detection-hpa
  labels:
    app: fraud-detection
    component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraud-detection-api
  
  minReplicas: 2
  maxReplicas: 10
  
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Also scale based on memory (model loading can spike memory)
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  
  # Fine-tune scaling behavior to avoid oscillation
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
